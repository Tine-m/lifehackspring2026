<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8" />
    <title>Vælg sværhedsgrad</title>
    <link rel="stylesheet" href="/public/css/teamR/styles.css" />
    <style>
        body {
            background-color: #001f3f;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        button {
            font-size: 1.5rem;
            margin: 15px;
            padding: 20px 40px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background-color: #004080;
            color: #cce7ff;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0066cc;
            color: white;
        }
    </style>
</head>
<body>
<h1>Vælg sværhedsgrad</h1>
<div>
    <button onclick="startQuiz('easy')">Easy</button>
    <button onclick="startQuiz('advanced')">Advanced</button>
</div>

<script>
    function startQuiz(level) {
        localStorage.setItem('quizLevel', level);
        window.location.href = '/' + level + '/1';

    }
</script>
</body>
</html>
