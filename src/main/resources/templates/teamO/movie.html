<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movie</title>
</head>
<body>

<h1>Random Movie</h1>

<div th:if="${movie != null}">
    <p>Title: <span th:text="${movie.title}"></span></p>
    <p>Year: <span th:text="${movie.year}"></span></p>
</div>

<p th:if="${error != null}" th:text="${error}"></p>

<a th:href="@{/randommovies}">Back</a>

</body>
</html>
