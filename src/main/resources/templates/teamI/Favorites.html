<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>CoffiiMe_Favorites</title>

    <link rel="stylesheet" th:href="@{/css/teamI/Stylesheet.css}">
</head>

<body>

<header>
    <div class="header">
        <div class="logoplace">
            <a th:href="@{/teamI/index}">
                <img src="/images/teamI/coffiimeLogo.png" class="logoSize">
            </a>
        </div>


        <ul class="account">
            <li><a th:href="@{/teamI/favoritsite}">Favorit</a></li>
            <li><a th:href="@{/teamI/login}"> Login </a></li>
            <li><a th:href="@{/teamI/createAccount}"> Create Account </a></li>
        </ul>
    </div>


    <ul class="menu">
        <div class="left">
            <li><a th:href="@{/teamI/coffeeType}"> Coffee Type </a></li>
            <li><a th:href="@{/teamI/coffeeBrands}"> Coffee Brands </a></li>
        </div>


        <div class="right">
            <li><a th:href="@{/teamI/colorPanel}"> Color Panel </a></li>
            <li><a th:href="@{/teamI/creatingPanel}"> Creating Panel </a></li>
        </div>
    </ul>


    <nav class="navCenter">
        <div class="menuLine">
            <span class="diamond"></span>
        </div>
    </nav>

</header>
<main>

    <nav class="navCenter">
        <div class="tableWrapper">
            <table class="tableStyle">
                <thead>
                <tr>
                    <th>Kaffe type</th>
                    <th>Mælk</th>
                    <th>Vand</th>
                    <th>Bønner</th>
                    <th>Brand</th>
                </tr>
                </thead>

                <tbody class="bodyText">
                <tr th:each="fav : ${favoritList}">
                    <td th:text="${fav.coffeetype}"></td>
                    <td th:text="${fav.milk}"></td>
                    <td th:text="${fav.water}"></td>
                    <td th:text="${fav.bean}"></td>
                    <td th:text="${fav.brand}"></td>

                </tr>
                </tbody>
            </table>
        </div>

        <form action="/teamI/favorit" method="get">
            <button type="submit">Se dine favoritter</button>
        </form>

    </nav>

    <p style="padding-top: 3%"></p>

</main>

<footer class="footer">
    <div class="footer-content">
        <ul class="footer-links">
            <li><a th:href="@{/teamI/aboutUs}"> About us </a></li>
            <li><a th:href="@{/teamI/contactUs}"> Contact us </a></li>
        </ul>
    </div>
</footer>

</body>
</html>
