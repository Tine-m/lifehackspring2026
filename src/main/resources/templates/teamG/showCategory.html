<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="en">
<link rel="stylesheet" th:href="@{/css/teamG/styles.css}">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1 th:text="'Kategori: ' + ${kategori}"></h1>

<ul class="hack-list">
    <li th:each="teamg_hack : ${Hacks}" class="hack-item">
        <div class="hack-text">
            <strong th:text="${teamg_hack.title}"></strong>
            <p th:text="${teamg_hack.description}"></p>
        </div>
        <a th:href="${teamg_hack.videolink}" target="_blank" class="btn">
            Watch Video
        </a>
    </li>
</ul>

</body>
</html>
