<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <title>kategori side</title>
    <link rel="stylesheet" th:href="@{/css/teamG/styles.css}">
</head>
<body>

<div class="container">
    <form method="post" action="/showCategory" class="form-box">
        <h2>Vælg kategori</h2>

        <label for="kategori">Kategori</label>

        <select name="kategori" id="kategori">
            <option value="school">School</option>
            <option value="food">Food</option>
            <option value="prank">Prank</option>
            <option value="everyday">Everyday</option>
        </select>

        <button type="submit">Søg</button>
    </form>
</div>

<script>
    function videosByCategory() {
        const kategori = document.getElementById("kategori").value;
        window.location.href = "showCategory.html?kategori=" + kategori;
    }
</script>
</body>
</html>
