<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <title>kategori side</title>
</head>
<body>

<form method="post" action="/showCategory">
    <label for="kategori">Vælg en kategori</label>

    <select name="kategori" id="kategori">
        <option id="school">school</option>
        <option id="food">food</option>
        <option id="prank">prank</option>
        <option id="everyday">everyday</option>
    </select>
    <button type="submit">Søg</button>
</form>

<script>
    function videosByCategory() {
        const kategori = document.getElementById("kategori").value;
        window.location.href = "showCategory.html?kategori=" + kategori;
    }
</script>
</body>
</html>
