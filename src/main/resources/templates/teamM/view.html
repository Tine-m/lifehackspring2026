<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackly</title>
    <link rel="stylesheet" href="/css/teamM/styles.css" th:href="@{/css/teamM/styles.css}"/>
</head>
<body>

<div class="page">
    <div class="logo-section">
        <img src="/images/teamM/image.png" class="logo">
    </div>

    <div class="tagline">
        <h2>All subscriptions</h2>
    </div>

    <div class="main-box">
        <div th:each="subscription : ${subscriptions}">
            <p><strong>Name:</strong> <span th:text="${subscription.name}">Name</span></p>
            <p><strong>Price:</strong> <span th:text="${subscription.price}">Price</span></p>
            <p><strong>Due Date:</strong> <span th:text="${subscription.dueDate}">Due Date</span></p>
            <hr>
        </div>
    </div>
</div>

</body>
</html>
