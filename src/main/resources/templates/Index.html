<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Frontpage</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

<audio id="bg-music" loop>
    <source src="/audio/Minecraft.mp3" type="audio/mpeg">
</audio>

<section>
    <div class="bg">
        <img src="/images/Lifehackbackground.png" class="layer" data-score="-3" alt="Baggrund">
    </div>

    <div class="center-content">
        <img src="/images/LifehackLogo.png" alt="Logo" class="logo">
        <div class="glassboxContainer">
            <div id="mainView">
                <div id="glassboxMain" class="glassbox">

                    <h2 class="editor-title">Rediger hoved</h2>

                    <div class="head-editor">

                        <div class="head-row head-row-top">
                            <div class="part-tile">
                                <canvas id="headTopCanvas" class="head"></canvas>
                                <span class="part-label">Top</span>
                            </div>

                            <div class="part-tile">
                                <canvas id="headBottomCanvas" class="head"></canvas>
                                <span class="part-label">Buttom</span>
                            </div>
                        </div>

                        <div class="head-row head-row-bottom">

                            <div class="part-tile">
                                <canvas id="headRightCanvas" class="head"></canvas>
                                <span class="part-label">Right</span>
                            </div>

                            <div class="part-tile">
                                <canvas id="headFrontCanvas" class="head"></canvas>
                                <span class="part-label">Front</span>
                            </div>

                            <div class="part-tile">
                                <canvas id="headLeftCanvas" class="head"></canvas>
                                <span class="part-label">Left</span>
                            </div>

                            <div class="part-tile">
                                <canvas id="headBackCanvas" class="head"></canvas>
                                <span class="part-label">Back</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="glassboxSecondary" class="glassbox">
                    <h2>Preview</h2>
                    <canvas id="previewCanvas"></canvas>
                </div>
            </div>
            <div id="options">
                <div id="glassboxMainOptions" class="glassbox">
                    <i class="bi bi-pencil-fill"></i>
                    <i class="bi bi-eraser"></i>
                    <i class="bi bi-paint-bucket"></i>
                    <i class="bi bi-palette-fill"></i>
                    <i class="bi bi-trash" id="trashcan"> </i>
                    <i class="bi bi-grid-3x2-gap-fill"></i>
                    <i class="bi bi-fonts"></i>
                    <i class="bi bi-volume-up-fill"></i>
                    <i class="bi bi-download"></i>
                </div>
                <div id="glassboxSecondaryOptions" class="glassbox">
                    <i class="bi bi-arrow-left-square" id="arrowLeft"> </i> <i class="bi bi-arrow-down-square"></i><i
                        class="bi bi-arrow-up-square"></i><i class="bi bi-arrow-right-square"></i>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    document.addEventListener("mousemove", function (e) {
        document.querySelectorAll(".layer").forEach(el => {
            const score = parseFloat(el.getAttribute("data-score"));
            const x = (window.innerWidth / 2 - e.pageX) * score / 100;
            const y = (window.innerHeight / 2 - e.pageY) * score / 100;

            el.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
        });
    });

    const music = document.getElementById("bg-music");

    music.volume = 0.2;

    document.addEventListener("click", () => {
        music.muted = false;
        music.play();
    }, { once: true });



</script>
<script src="/js/app.js" defer></script>
</body>
</html>
